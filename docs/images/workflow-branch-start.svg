<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">musafety branch start workflow screenshot</title>
  <desc id="desc">Illustrative terminal screenshot showing branch start script creating isolated agent branch and worktree.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#080d18"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect x="24" y="20" width="1352" height="820" rx="14" fill="#0f172a" stroke="#25314a"/>
  <circle cx="54" cy="48" r="8" fill="#ef4444"/>
  <circle cx="78" cy="48" r="8" fill="#f59e0b"/>
  <circle cx="102" cy="48" r="8" fill="#22c55e"/>
  <text x="130" y="53" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">branch start protocol</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e2e8f0">
    <text x="44" y="100">deadpool@ksskkfb03:~/repo$ bash scripts/agent-branch-start.sh "billing-limit-fix" "agent-anna"</text>
    <text x="44" y="142" fill="#67e8f9">[agent-branch-start] Syncing dev from origin/dev...</text>
    <text x="44" y="182" fill="#67e8f9">[agent-branch-start] Creating branch: agent/agent-anna/billing-limit-fix-20260410-0040</text>
    <text x="44" y="222" fill="#67e8f9">[agent-branch-start] Creating worktree: ../worktrees/agent-anna-billing-limit-fix</text>
    <text x="44" y="262" fill="#86efac">[agent-branch-start] ✅ Ready</text>

    <text x="44" y="332">Next safe commands:</text>
    <text x="70" y="372">cd ../worktrees/agent-anna-billing-limit-fix</text>
    <text x="70" y="412">python3 scripts/agent-file-locks.py claim --branch "$(git rev-parse --abbrev-ref HEAD)" frontend/src/account.tsx</text>
    <text x="70" y="452">git add -A &amp;&amp; git commit -m "Implement billing limit fix"</text>
    <text x="70" y="492">bash scripts/agent-branch-finish.sh --branch "$(git rev-parse --abbrev-ref HEAD)"</text>

    <text x="44" y="562">Why this matters:</text>
    <text x="70" y="602" fill="#cbd5e1">• each agent gets isolated branch/worktree</text>
    <text x="70" y="638" fill="#cbd5e1">• dev is synced first to reduce merge conflicts</text>
    <text x="70" y="674" fill="#cbd5e1">• lock protocol can now protect owned files</text>

    <text x="44" y="744" fill="#86efac">Protocol status: SAFE TO START IMPLEMENTATION</text>
  </g>
</svg>
